services:
  db:
    image: postgres:16-alpine
    container_name: techan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: techan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d techan"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techan-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      APP_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:password@db:5432/techan?schema=public
      JWT_ACCESS_SECRET: QvY9qKCAOqlKcSTZdtvKYANkEUw3MCi72AuAg49DRAK
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: 1pUs5IBda2sYub6ErBazMaJo48V9DNqQKniJtQ4YvEx
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WHITELIST: 127.0.0.1
      COOKIE_SECRET: your-cookie-secret-change-in-production
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      CORS_ORIGINS: http://localhost:3000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
      REDIS_URL: redis://localhost:6379
      SENTRY_DSN: ""
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: techan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
